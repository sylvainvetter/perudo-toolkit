<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Perudo Toolkit{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#f59e0b', dark: '#d97706', light: '#fcd34d' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .die {
      width: 3rem; height: 3rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0.5rem;
      border: 2px solid #475569;
      font-size: 1.25rem; font-weight: 700;
      cursor: pointer; user-select: none;
      transition: all 0.1s ease;
      background: #1e293b;
      color: #e2e8f0;
    }
    .die:hover { border-color: #f59e0b; color: #f59e0b; transform: scale(1.08); }
    .die.value-1 { border-color: #f59e0b; color: #f59e0b; }
    .die.inactive { opacity: 0.25; pointer-events: none; }
    .badge-raise  { background: #14532d; color: #4ade80; border: 1px solid #16a34a; }
    .badge-liar   { background: #450a0a; color: #f87171; border: 1px solid #dc2626; }
    .badge-exact  { background: #422006; color: #fb923c; border: 1px solid #ea580c; }
  </style>
</head>
<body class="h-full bg-slate-900 text-slate-100 font-sans antialiased">

  <!-- Navigation -->
  <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 flex items-center justify-between h-14">
      <a href="/" class="flex items-center gap-2 font-bold text-brand text-lg tracking-wide">
        🎲 Perudo
      </a>
      <div class="flex items-center gap-1">
        <a href="/" class="px-3 py-1.5 rounded text-sm font-semibold hover:bg-slate-700 transition
                           {% if active == 'lobby' %}bg-slate-700 text-brand{% else %}text-slate-200{% endif %}">
          🌐 En ligne
        </a>
        <!-- Toolkit dropdown -->
        <div class="relative" x-data="{open:false}" @mouseleave="open=false">
          <button @mouseenter="open=true" @click="open=!open"
            class="px-3 py-1.5 rounded text-sm font-medium hover:bg-slate-700 transition
                   {% if active in ['advisor','proba','sim'] %}bg-slate-700 text-brand{% else %}text-slate-400{% endif %}
                   flex items-center gap-1">
            Toolkit <span class="text-xs opacity-60">▾</span>
          </button>
          <div x-show="open" x-cloak
               class="absolute right-0 mt-1 w-40 bg-slate-800 border border-slate-600 rounded-lg shadow-xl z-50 py-1">
            <a href="/toolkit" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 hover:text-brand transition">
              Conseiller
            </a>
            <a href="/proba" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 hover:text-brand transition">
              Probabilités
            </a>
            <a href="/sim" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 hover:text-brand transition">
              Simulation
            </a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
